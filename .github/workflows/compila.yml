name: Compilar LaTeX i commitar PDF

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout
      - name: Checkout del codi
        uses: actions/checkout@v4

      # 2. Compilar LaTeX → PDF
      - name: Compilar amb XeLaTeX
        uses: xu-cheng/latex-action@v3
        env:
          TEXINPUTS: ".:./assets/:"
        with:
          root_file: examen.tex
          compiler: xelatex
          args: "-interaction=nonstopmode -halt-on-error"
          extra_fonts: ./assets/fonts/*.ttf
          work_in_root_file_dir: true

      # 3. Commitar el PDF de tornada al repo
      - name: Commitar PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add examen.pdf
          git diff --staged --quiet || git commit -m "PDF compilat automàticament [skip ci]"
          git push

      # 4. Guardar també com a Artifact (descàrrega directa des de GitHub)
      - name: Guardar Artifact
        uses: actions/upload-artifact@v4
        with:
          name: examen-pdf
          path: examen.pdf
          retention-days: 90
