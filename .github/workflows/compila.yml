name: Compilar LaTeX i commitar PDF

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codi
        uses: actions/checkout@v4

      # extra_fonts instal·la les fonts DINS del contenidor Docker de l'action
      - name: Compilar tots els fitxers LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            examen_base.tex
            examen_PI_Erlin_Cantarero.tex
            examen_PI_Iu_Martinez.tex
            examen_PI_Oskar_Talamas.tex
            examen_base_solucionari.tex
            examen_PI_Erlin_solucionari.tex
            examen_PI_Iu_solucionari.tex
            examen_PI_Oskar_solucionari.tex
          compiler: xelatex
          args: "-interaction=nonstopmode -halt-on-error"
          extra_fonts: |
            ./assets/fonts/*.ttf
          work_in_root_file_dir: true

      - name: Commitar PDFs al repositori
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.pdf
          git diff --staged --quiet || git commit -m "PDFs compilats [skip ci]"
          git push

      - name: Guardar tots els PDFs com a Artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-exams-pdfs
          path: "*.pdf"
          retention-days: 90
