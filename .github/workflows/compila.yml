name: Compilar LaTeX i commitar PDF

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codi
        uses: actions/checkout@v4

      - name: Compilar tots els fitxers LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            examen_base.tex
            examen_Oskar.tex
            examen_Erlin.tex
            examen_Iu.tex
          compiler: xelatex
          args: "-interaction=nonstopmode -halt-on-error"
          extra_fonts: ./assets/fonts/*.ttf
          work_in_root_file_dir: true

      - name: Commitar tots els PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.pdf
          git diff --staged --quiet || git commit -m "PDFs compilats automàticament [skip ci]"
          git push

      - name: Guardar Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-exams-pdfs
          path: "*.pdf"
          retention-days: 90
