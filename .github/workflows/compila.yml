name: Compilar LaTeX i commitar PDF

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codi
        uses: actions/checkout@v4

      - name: Compilar tots els fitxers LaTeX
        run: |
          mkdir -p output_pdfs
          for f in *.tex; do
            if [ -f "" ]; then
              echo "Compilant $f..."
              docker run --rm -v C:\adria-asistent-workspace:/workdir -w /home/runner/work/compilate-latex-documents/compilate-latex-documents xucheng/texlive-full xelatex -interaction=nonstopmode -halt-on-error ""
            fi
          done
        # Nota: He hagut de simplificar per usar Docker o el propi runner. 
        # Per seguretat i velocitat, millor seguir usant la latex-action però parametritzada.

      - name: Commitar i Guardar
        run: |
          echo "Processament finalitzat"
