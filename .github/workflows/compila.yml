name: Compilar LaTeX i commitar PDF

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codi
        uses: actions/checkout@v4

      - name: Instal·lar fonts al sistema
        run: |
          mkdir -p ~/.local/share/fonts
          cp assets/fonts/*.ttf ~/.local/share/fonts/
          fc-cache -f -v

      - name: Compilar tots els fitxers LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            examen_base.tex
            examen_Oskar.tex
            examen_Erlin.tex
            examen_Iu.tex
          compiler: xelatex
          args: "-interaction=nonstopmode -halt-on-error"
          # No cal extra_fonts aquí perquè ja les hem posat al sistema
          work_in_root_file_dir: true

      - name: Commitar i Guardar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.pdf
          git diff --staged --quiet || git commit -m "PDFs compilats [skip ci]"
          git push
